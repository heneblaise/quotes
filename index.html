<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Quotes</title>
<!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --accent:#38bdf8;
  --danger:#ef4444;
}
*{
  outline: none;
  -webkit-tap-highlight-color: transparent; 
  user-select: none; /* Prevents text highlight when tapping */
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.container{
  max-width:420px;
  width:100%;
  padding:16px;
}

h1{
  text-align:center;
  font-weight:600;
}

/* Custom dropdown */
.select-wrapper{
  position:relative;
  margin-top:10px;
}

select{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:var(--card);
  color:var(--text);
  border:none;
  appearance:none;
  font-size:16px;
}

.select-wrapper::after{
  content:"▼";
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  color:#94a3b8;
}

.quote-box{
  background:var(--card);
  padding:25px 20px;
  border-radius:20px;
  text-align:center;
  min-height:140px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

#quoteText{
  font-size:18px;
  line-height:1.5;
  margin-bottom: 50px;
}

.actions{
  display:flex;
  justify-content:space-between;
}

button{
  cursor:pointer;
  border:none;
  border-radius:10px;
  padding:8px 12px;
  font-size:14px;
}

#shareBtn{
  background:var(--accent);
  color:#000;
}

.favorite{
  background:transparent;
  font-size:22px;
}

.favorite span{
  color:#94a3b8;
  transition:0.3s;
}

.favorite.active span{
  color:var(--danger);
}

.nav-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0px;
}

.nav-buttons button{
  background:#334155;
  color:white;
}

#prevBtn, #nextBtn{
  height: 2.5rem;
  width: 5rem;
}









 /* About section */
    .about-section{width: 700px}
    .about-section, 
    .related-section {
      margin: 25px;
      text-align: left;
    }
    .about-header, 
    .related-header {
    background: rgba(255, 255, 255, 0.1);
      padding: 15px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s ease;
    }
    .about-header:hover,
    .related-header:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .arrow,
    .arow {
      transition: transform 0.3s ease;
    }
    .arrow.rotate,
    .arow.rotate {
      transform: rotate(180deg);
    }
    .about-content, 
    .related-content {
      max-height: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 0px 20px;
      line-height: 1.6;
      transition: max-height 0.5s ease, padding 0.3s ease;
    }
    .about-content.open, 
    .related-content.open {
      max-height: 300px;
      padding: 5px 20px;
    }


.contact-section {
  margin: 5px auto;
  padding: 0px 3px 5px 3px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  width: 320px;
  text-align: center;
}

.contact-title {
  font-size: 1.5em;
  font-weight: bold;
  margin: 5px;
  text-align: center;
}

.contact-section h4 {
  margin: 0px auto 15px;
  color: gold;
}

.contact-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
}

.contact-info {
  font-weight: bold;
  color: #fff;
  text-decoration: none;
  transition: color 0.3s;
}

.contact-info:hover {
 color: var(--accent);
}







.footer{
  margin-top:25px;
  font-size:16px;
  text-align:center;
  opacity:0.7;
}


@media (max-width: 700px) {
      
select{
  width:70%;
  margin-left: 50px;
  font-size:18px;
}

.select-wrapper::after{
  right:100px;
}

    }



</style>
</head>

<body>
<div class="container">

<h1>Status Quotes</h1>

<div class="select-wrapper">
<select id="category">
  <option value="all">All</option>
  <option value="motivation">Motivation</option>
  <option value="love">Love</option>
  <option value="success">Success</option>
  <option value="life">Life</option>
  <option value="happiness">Happiness</option>
  <option value="favorites">❤️ Favorites</option>
</select>
</div>

<div class="quote-box" id="quoteBox">
  <p id="quoteText"></p>

  <div class="actions">
    <button class="favorite" id="favBtn"><span>❤</span></button>
    <button id="shareBtn">Share</button>
  </div>
</div>

<div class="nav-buttons">
  <button id="prevBtn">Prev</button>
  <button id="nextBtn">Next</button>
</div>





<!-- Related sites Section -->
    <div class="related-section">
      <div class="related-header" onclick="toggleRelated()">
      Our Projects 
        <span class="arow" id="arow">▼</span>
      </div>
      <div class="related-content" id="relatedContent">
        <h3 style="text-align: center;
        margin: 5px 0px 0px;
        color: gold;"> 
        Access our other sites </h3>

        <p style="margin-top: 0px;">
           👉<strong> Villian quotes </strong>. <br>
            A collection of the greatest villain quotes across Movies, TV Series, Animes & More. 
             <a href="#" style="color: gold;"> Click here</a>
        </p>

      </div>
    </div>





<!-- contact section -->

<div class="contact-section">
  <h2 class="contact-title">Contact us</h2> 
  <h4> Available for all you Web design deals 🤝 </h4>
  
  <div class="contact-row">
    <a href="https://wa.me/237654177854" class="contact-info left">
      <i class="fab fa-whatsapp"></i>
      654-177-854</a> 
    <span style="margin: 0px 3px">  |  </span>
    <a href="mailto:henepapah23@gmail.com" class="contact-info right"> ✉️ HB@gmail.com</a>
  </div>
</div>



<div class="footer">
© 2026 Status Quotes | Designed by HB
</div>

</div>

<Script src="quotes.js"></Script>

<script>

// CENTRAL QUOTES STORAGE (EASY TO EDIT LATER)
// const QUOTES = {
//   motivation:[
//     "Stay strong.",
//     "Never give up.",
//     "Push your limits."
//   ],
//   love:[
//     "Love conquers all.",
//     "You are enough.",
//     "Love starts within you."
//   ],
//   success:[
//     "Success is earned, not given.",
//     "Work hard in silence.",
//     "Dream big, act bigger."
//   ],
//   life:[
//     "Life is what you make it.",
//     "Enjoy every moment.",
//     "Live with purpose."
//   ],
//   happiness:[
//     "Happiness is a choice.",
//     "Smile more often.",
//     "Peace begins with you."
//   ]
// };

// Convert to flat structure
function getAllQuotes(){
  let arr = [];
  for(let cat in QUOTES){
    QUOTES[cat].forEach(q=>{
      arr.push({text:q, category:cat});
    });
  }
  return arr;
}

let quotes = getAllQuotes();
let filtered = [...quotes];
let index = Math.floor(Math.random()*quotes.length);

const quoteText = document.getElementById("quoteText");
const favBtn = document.getElementById("favBtn");

function getFavorites(){
  return JSON.parse(localStorage.getItem("favs")||"[]");
}

function showQuote(){
  if(filtered.length === 0){
    quoteText.textContent = "No quotes here yet.";
    return;
  }

  const q = filtered[index];
  quoteText.textContent = q.text;

  const favs = getFavorites();
  favBtn.classList.toggle("active", favs.includes(q.text));
}

showQuote();

nextBtn.onclick = ()=>{
  index = (index+1)%filtered.length;
  showQuote();
};

prevBtn.onclick = ()=>{
  index = (index-1+filtered.length)%filtered.length;
  showQuote();
};

category.onchange = (e)=>{
  const value = e.target.value;

  if(value === "favorites"){
    const favs = getFavorites();
    filtered = quotes.filter(q=>favs.includes(q.text));
  } else if(value === "all"){
    filtered = quotes;
  } else {
    filtered = quotes.filter(q=>q.category===value);
  }

  index = 0;
  showQuote();
};

favBtn.onclick = ()=>{
  const q = filtered[index]?.text;
  if(!q) return;

  let favs = getFavorites();

  if(favs.includes(q)){
    favs = favs.filter(f=>f!==q);
  } else {
    favs.push(q);
  }

  localStorage.setItem("favs", JSON.stringify(favs));
  showQuote();
};

shareBtn.onclick = async ()=>{
  const text = quoteText.textContent;

  if(navigator.share){
    navigator.share({text});
  } else {
    navigator.clipboard.writeText(text);
    alert("Copied");
  }
};

let startX = 0;
quoteBox.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

quoteBox.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) nextBtn.click();
  if(endX - startX > 50) prevBtn.click();
});


function toggleAbout() {
      const content = document.getElementById("aboutContent");
      const arrow = document.getElementById("arrow");
      content.classList.toggle("open");
      arrow.classList.toggle("rotate");
    }
    
    function toggleRelated() {
      const content = document.getElementById("relatedContent");
      const arrow = document.getElementById("arow");
      content.classList.toggle("open");
      arrow.classList.toggle("rotate");
    }


</script>
</body>
</html>
